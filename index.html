<!DOCTYPE html>
<html>

<head>
    <title> The Champion Challenge 🏆</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="container">

    <h1>🏆 Champion Pick</h1>

    <h2>Predict the FIFA World Cup 2026 Winner</h2>


    <div id="deadline">
        Predictions close: <span id="timer"></span>
    </div>


    <input 
        id="name" 
        placeholder="Your name"
    >


    <h3>Select Champion</h3>


    <div id="teams"></div>


    <button id="submitBtn">
        Submit Prediction
    </button>


    <p id="message"></p>


</div>


<script type="module" src="app.js"></script>


</body>

</html>
